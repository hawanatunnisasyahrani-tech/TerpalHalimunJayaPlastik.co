<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT. Terpal Halimun Jaya Plastik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; }

        /* Gaya Khusus untuk Layout Logo Rapi & Mewah */
        .premium-bg-light {
            background: radial-gradient(circle at 50% -20%, rgba(192, 132, 61, 0.05) 0%, #ffffff 80%);
            position: relative;
        }

        /* Container Logo dengan Efek Kedalaman */
        .logo-item {
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            filter: grayscale(100%) opacity(70%); /* Standar: Hitam Putih & Tipis */
        }

        .logo-item:hover {
            filter: grayscale(0%) opacity(100%); /* Hover: Berwarna & Jelas */
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.03);
        }

        /* Label Kecil Premium */
        .animate-reveal { animation: fadeInUp 1s cubic-bezier(0.2, 1, 0.2, 1) forwards; opacity: 0; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

    <nav class="bg-white sticky top-0 z-50 shadow-sm p-4 md:px-12 border-b border-gray-100">

                Official Brand Distribution
